<!DOCTYPE html>
<html>
<body style="font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 24px; color: #1e293b;">
  <div style="text-align: center; margin-bottom: 32px;">
    <div style="display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: #4f46e5; border-radius: 16px; margin-bottom: 16px;">
      <span style="color: white; font-weight: bold; font-size: 20px;">M</span>
    </div>
    <h1 style="font-size: 22px; font-weight: 700; margin: 0 0 4px;">Your sign-in code</h1>
    <p style="color: #64748b; font-size: 14px; margin: 0;">Enter this code in MentalLoad to sign in.</p>
  </div>
  <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 24px;">
    <p style="font-size: 36px; font-weight: 700; letter-spacing: 0.25em; font-family: monospace; margin: 0; color: #4f46e5;">{{ .Token }}</p>
  </div>
  <p style="color: #94a3b8; font-size: 12px; text-align: center; margin: 0;">This code expires in 1 hour. If you didn't request this, you can ignore this email.</p>
</body>
</html>
